# OpenClaw-aligned provider probes.
#
# Design notes:
# - We do not require every target to use /cdn-cgi/trace, but today the most
#   stable public IP-echo probes on official provider domains are still
#   Cloudflare trace endpoints.
# - This file prefers channels that map to real OpenClaw providers and can
#   return the caller IP without authentication.
# - Providers that do not currently expose a reliable public IP-echo probe on
#   an official domain are intentionally left out for now, rather than adding
#   noisy targets that only look complete on paper.
# - Some providers split mainland China vs international routing. MiniMax is
#   one confirmed example in official docs, so the current MiniMax entries are
#   labeled as Intl-only until a CN-region probe meets the same bar.

[[targets]]
name = "OpenAI OAuth"
url = "https://auth.openai.com/cdn-cgi/trace"
type = "cloudflare_trace"

